name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
  pull_request:

env:
  BUILD_TAG: fail2ban:test
  CONTAINER_NAME: fail2ban

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        iptables:
          - auto
          - nft
          - legacy
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Build
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        with:
          source: .
          targets: image-local
        env:
          DEFAULT_TAG: ${{ env.BUILD_TAG }}
      -
        name: Start
        run: |
          docker compose up -d
        working-directory: test
        env:
          FAIL2BAN_IMAGE: ${{ env.BUILD_TAG }}
          FAIL2BAN_CONTAINER: ${{ env.CONTAINER_NAME }}
          IPTABLES_MODE: ${{ matrix.iptables }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@64a0bfaf6e6bb1c448d6e4c42b11034ee7094f16 # v1.7.1
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          log_check: "Server ready"
          timeout: 120
      -
        name: Logs
        if: always()
        run: |
          docker compose logs
        working-directory: test
        env:
          FAIL2BAN_IMAGE: ${{ env.BUILD_TAG }}
          FAIL2BAN_CONTAINER: ${{ env.CONTAINER_NAME }}
